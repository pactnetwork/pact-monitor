name: Publish @q3labs/pact-sdk

# Publishes @q3labs/pact-sdk and its public protocol client dependency to npm
# on every push to main that touches the SDK release surface. The workflow is
# path-gated, version-monotonic, and idempotent on re-runs.

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - "packages/protocol-v1-client/**"
      - ".github/workflows/publish-sdk.yaml"
  workflow_dispatch:

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is only needed for `npm publish --provenance`. We keep
      # provenance off while pactnetwork/pact-monitor is private because npm
      # rejects sigstore bundles from private source repositories.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publish packages
        run: pnpm --filter @q3labs/pact-protocol-v1-client --filter @q3labs/pact-sdk build

      - name: Typecheck publish packages
        run: |
          pnpm --filter @q3labs/pact-protocol-v1-client typecheck
          pnpm --filter @q3labs/pact-sdk typecheck

      - name: Test publish packages
        run: |
          pnpm --filter @q3labs/pact-protocol-v1-client test
          pnpm --filter @q3labs/pact-sdk test

      - name: Resolve protocol client version
        id: protocol_check
        working-directory: packages/protocol-v1-client
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          LATEST_NPM=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ -n "$LATEST_NPM" ]; then
            if npx --yes semver "$LATEST_NPM" -r ">$VERSION" > /dev/null 2>&1; then
              echo "::error::Refusing to publish $NAME@$VERSION: npm latest is $LATEST_NPM (strictly greater). Bump package.json above $LATEST_NPM."
              exit 1
            fi
          fi

          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish @q3labs/pact-protocol-v1-client
        if: steps.protocol_check.outputs.skip == 'false'
        working-directory: packages/protocol-v1-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # TODO(repo-public): re-add `--provenance` and id-token: write when
        # pactnetwork/pact-monitor is public.
        run: |
          # Dry-run first so package metadata/packing problems surface before
          # the real append-only npm publish. If this real publish succeeds but
          # a later SDK gate fails, recover by bumping this package version.
          pnpm publish --access public --no-git-checks --dry-run
          pnpm publish --access public --no-git-checks

      - name: Verify @q3labs/pact-protocol-v1-client on npm
        env:
          NAME: ${{ steps.protocol_check.outputs.name }}
          VERSION: ${{ steps.protocol_check.outputs.version }}
        run: |
          set -euo pipefail
          for i in {1..12}; do
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$NAME@$VERSION is visible on npm"
              exit 0
            fi
            sleep 5
          done
          echo "::error::$NAME@$VERSION was not visible on npm after 60s"
          exit 1

      - name: Pack and install external consumer smoke
        run: pnpm --filter @q3labs/pact-sdk smoke:pack

      - name: Resolve SDK version
        id: sdk_check
        working-directory: packages/sdk
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          LATEST_NPM=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ -n "$LATEST_NPM" ]; then
            if npx --yes semver "$LATEST_NPM" -r ">$VERSION" > /dev/null 2>&1; then
              echo "::error::Refusing to publish $NAME@$VERSION: npm latest is $LATEST_NPM (strictly greater). Bump package.json above $LATEST_NPM."
              exit 1
            fi
          fi

          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish @q3labs/pact-sdk
        if: steps.sdk_check.outputs.skip == 'false'
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # TODO(repo-public): re-add `--provenance` and id-token: write when
        # pactnetwork/pact-monitor is public.
        run: |
          pnpm publish --access public --no-git-checks --dry-run
          pnpm publish --access public --no-git-checks

      - name: Verify @q3labs/pact-sdk on npm
        env:
          NAME: ${{ steps.sdk_check.outputs.name }}
          VERSION: ${{ steps.sdk_check.outputs.version }}
        run: |
          set -euo pipefail
          for i in {1..12}; do
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$NAME@$VERSION is visible on npm"
              exit 0
            fi
            sleep 5
          done
          echo "::error::$NAME@$VERSION was not visible on npm after 60s"
          exit 1

      - name: Tag and release
        if: steps.sdk_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.sdk_check.outputs.name }}
          VERSION: ${{ steps.sdk_check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="sdk-v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$TAG" -m "$NAME@$VERSION"
          git push origin "$TAG"
          NOTES=$'Published to npm: https://www.npmjs.com/package/'"${NAME}"'/v/'"${VERSION}"$'\n\nAgent SDK for Pact Network V1. External install smoke passed before publish: `npm install @q3labs/pact-sdk` and ESM import of `createPact`.'
          gh release create "$TAG" \
            --title "$NAME@$VERSION" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA"
