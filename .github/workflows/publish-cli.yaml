name: Publish @q3labs/pact-cli

# Publishes pact-cli to npm on every push to main that touches `packages/cli/**`,
# mirroring the publish-monitor / publish-insurance pattern (path-gated,
# version-monotonic, idempotent on re-runs).
#
# Multi-platform packaging (esbuild-style): `bun build --compile` produces a
# native binary per platform, so we publish:
#   - @q3labs/pact-cli              — tiny package; bin = bin/pact.cjs launcher
#                                     shim + optionalDependencies on the 5 below
#   - @q3labs/pact-cli-linux-x64    — prebuilt binary, os/cpu pinned
#   - @q3labs/pact-cli-linux-arm64
#   - @q3labs/pact-cli-darwin-x64
#   - @q3labs/pact-cli-darwin-arm64
#   - @q3labs/pact-cli-windows-x64
# npm/pnpm install only the platform package matching the host; the shim
# require.resolve()s it and execs the binary. `bun build --compile
# --target=bun-<os>-<arch>` cross-compiles all of them from one ubuntu runner.

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/protocol-v1-client/**"
      - ".github/workflows/publish-cli.yaml"
  workflow_dispatch:

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is only needed for `npm publish --provenance`. We had to
      # drop --provenance because the source repo is private and npm rejects
      # sigstore provenance bundles from private repos ("Unsupported GitHub
      # Actions source repository visibility: 'private'"). Restore id-token:
      # write the same time you re-add --provenance below.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (native dist/pact for smoke + binary-init regression test)
        run: pnpm --filter @q3labs/pact-cli build

      - name: Test
        run: pnpm --filter @q3labs/pact-cli test

      - name: Smoke — native dist/pact responds to --version
        working-directory: packages/cli
        run: |
          set -euo pipefail
          test -x dist/pact || { echo "::error::dist/pact missing or not executable"; exit 1; }
          ./dist/pact --version

      - name: Build per-platform packages
        run: pnpm --filter @q3labs/pact-cli build:platforms

      - name: Smoke — launcher shim resolves + execs a platform binary
        working-directory: packages/cli
        run: |
          set -euo pipefail
          mkdir -p node_modules/@q3labs
          rm -rf node_modules/@q3labs/pact-cli-linux-x64
          ln -s "$PWD/dist-platforms/linux-x64" node_modules/@q3labs/pact-cli-linux-x64
          OUT=$(node bin/pact.cjs --version)
          EXPECTED=$(node -p "require('./package.json').version")
          [ "$OUT" = "$EXPECTED" ] || { echo "::error::shim --version '$OUT' != '$EXPECTED'"; exit 1; }
          echo "shim ok: pact $OUT via @q3labs/pact-cli-linux-x64"

      - name: Inject platform optionalDependencies into @q3labs/pact-cli
        working-directory: packages/cli
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const v = pkg.version;
            pkg.optionalDependencies = {
              "@q3labs/pact-cli-linux-x64": v,
              "@q3labs/pact-cli-linux-arm64": v,
              "@q3labs/pact-cli-darwin-x64": v,
              "@q3labs/pact-cli-darwin-arm64": v,
              "@q3labs/pact-cli-windows-x64": v,
            };
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          node -p "require('./package.json').optionalDependencies"

      - name: Resolve names + versions, enforce monotonicity
        id: check
        working-directory: packages/cli
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          # Monotonicity guard on the umbrella package: block a downgrade
          # republish (publishing 0.2.1 after 0.2.2 was released would silently
          # regress consumers on "latest"). Runs before the idempotency check so
          # a rolled-back package.json cannot smuggle a downgrade through.
          LATEST_NPM=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ -n "$LATEST_NPM" ]; then
            if npx --yes semver "$LATEST_NPM" -r ">$VERSION" > /dev/null 2>&1; then
              echo "::error::Refusing to publish $NAME@$VERSION: npm latest is $LATEST_NPM (strictly greater). Bump package.json above $LATEST_NPM."
              exit 1
            fi
          fi

          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip_umbrella=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — will skip umbrella publish (platform packages still checked individually)."
          else
            echo "skip_umbrella=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish platform packages
        working-directory: packages/cli/dist-platforms
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for d in */; do
            d="${d%/}"
            NAME=$(node -p "require('./$d/package.json').name")
            VERSION=$(node -p "require('./$d/package.json').version")
            if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
              echo "::notice::$NAME@$VERSION already on npm — skipping."
              continue
            fi
            echo "::notice::Publishing $NAME@$VERSION"
            ( cd "$d" && npm publish --access public )
          done

      - name: Publish @q3labs/pact-cli
        if: steps.check.outputs.skip_umbrella == 'false'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # TODO(repo-public): re-add `--provenance` (and `id-token: write` above)
        # once pactnetwork/pact-monitor goes public. npm rejects provenance
        # bundles from private repos. publish-monitor.yaml / publish-insurance.yaml
        # carry the same flag and will hit the same wall — flag them when you
        # flip this back.
        run: pnpm publish --access public --no-git-checks

      - name: Tag and release
        if: steps.check.outputs.skip_umbrella == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.check.outputs.name }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="cli-v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$TAG" -m "$NAME@$VERSION"
          git push origin "$TAG"
          NOTES=$'Published to npm: https://www.npmjs.com/package/'"${NAME}"'/v/'"${VERSION}"$'\n\nMulti-platform: linux-x64, linux-arm64, darwin-x64, darwin-arm64, windows-x64 (Bun-compiled standalone binaries, shipped as @q3labs/pact-cli-<platform> optionalDependencies). `npm install -g @q3labs/pact-cli` works on all five.'
          gh release create "$TAG" \
            --title "$NAME@$VERSION" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA"
