name: Publish @q3labs/pact-cli

# Publishes pact-cli to npm on every push to main that touches `packages/cli/**`,
# mirroring the publish-monitor / publish-insurance pattern (path-gated,
# version-monotonic, idempotent on re-runs).
#
# Single-package distribution (0.2.8+): `bun build --target=node` produces a
# Node-compatible JS bundle (`dist/pact.js`) that runs on any platform with
# Node 18+. No native binaries, no platform sub-packages.
#
# History: 0.2.2 — 0.2.6 shipped as 5 platform-specific sub-packages
# (`@q3labs/pact-cli-<os>-<arch>`) + an umbrella with optionalDependencies.
# 0.2.7 attempted multi-platform publish and failed: the NPM token had write
# access to the umbrella only, not the sub-package names. 0.2.8 collapses to
# the umbrella alone so the token's scope matches the publish surface.

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/protocol-v1-client/**"
      - ".github/workflows/publish-cli.yaml"
  workflow_dispatch:

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is only needed for `npm publish --provenance`. We had to
      # drop --provenance because the source repo is private and npm rejects
      # sigstore provenance bundles from private repos ("Unsupported GitHub
      # Actions source repository visibility: 'private'"). Restore id-token:
      # write the same time you re-add --provenance below.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (dist/pact.js — Node-compatible bundle)
        run: pnpm --filter @q3labs/pact-cli build

      - name: Test
        run: pnpm --filter @q3labs/pact-cli test

      - name: Smoke — dist/pact.js responds to --version under Node
        working-directory: packages/cli
        run: |
          set -euo pipefail
          test -x dist/pact.js || { echo "::error::dist/pact.js missing or not executable"; exit 1; }
          OUT=$(node dist/pact.js --version)
          EXPECTED=$(node -p "require('./package.json').version")
          [ "$OUT" = "$EXPECTED" ] || { echo "::error::node dist/pact.js --version '$OUT' != '$EXPECTED'"; exit 1; }
          echo "bundle ok: pact $OUT"

      - name: Resolve names + versions, enforce monotonicity
        id: check
        working-directory: packages/cli
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          # Monotonicity guard: block a downgrade republish (publishing 0.2.1
          # after 0.2.2 was released would silently regress consumers on
          # "latest"). Runs before the idempotency check so a rolled-back
          # package.json cannot smuggle a downgrade through.
          LATEST_NPM=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ -n "$LATEST_NPM" ]; then
            if npx --yes semver "$LATEST_NPM" -r ">$VERSION" > /dev/null 2>&1; then
              echo "::error::Refusing to publish $NAME@$VERSION: npm latest is $LATEST_NPM (strictly greater). Bump package.json above $LATEST_NPM."
              exit 1
            fi
          fi

          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish @q3labs/pact-cli
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # TODO(repo-public): re-add `--provenance` (and `id-token: write` above)
        # once pactnetwork/pact-monitor goes public. npm rejects provenance
        # bundles from private repos. publish-monitor.yaml / publish-insurance.yaml
        # carry the same flag and will hit the same wall — flag them when you
        # flip this back.
        run: pnpm publish --access public --no-git-checks

      - name: Tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.check.outputs.name }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="cli-v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$TAG" -m "$NAME@$VERSION"
          git push origin "$TAG"
          NOTES=$'Published to npm: https://www.npmjs.com/package/'"${NAME}"'/v/'"${VERSION}"$'\n\nSingle-package Node bundle (`bun build --target=node`). Runs on any platform with Node 18+. `npm install -g @q3labs/pact-cli`.'
          gh release create "$TAG" \
            --title "$NAME@$VERSION" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA"
