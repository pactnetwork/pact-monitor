name: Publish @pact-network/insurance

on:
  push:
    branches: [main]
    paths:
      - "packages/insurance/**"
      - ".github/workflows/publish-insurance.yaml"
  workflow_dispatch:

concurrency:
  group: publish-insurance
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm --filter @pact-network/insurance test

      - name: Build
        run: pnpm --filter @pact-network/insurance build

      - name: Check if version already published
        id: check
        working-directory: packages/insurance
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/insurance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.check.outputs.name }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="insurance-v${VERSION}"
          git tag -a "$TAG" -m "$NAME@$VERSION"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$NAME@$VERSION" \
            --notes "Published to npm: https://www.npmjs.com/package/${NAME}/v/${VERSION}" \
            --target "$GITHUB_SHA"
