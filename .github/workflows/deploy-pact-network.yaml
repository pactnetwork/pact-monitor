# -----------------------------------------------------------------------------
# Pact Network — Deploy to Cloud Run
#
# Deploys one of three Cloud Run services. Image must already exist in
# Artifact Registry (push via build-pact-network.yaml first).
#
# Pattern: copied from devops/pipelines-gcp/qash/deploy.yaml.
# Secret bindings (--set-secrets) are NOT in this workflow — they're applied
# once via gcloud post-`terraform apply` and persist across deploys.
# -----------------------------------------------------------------------------

name: Deploy to Cloud Run (pact-network)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      service_name:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - pact-market-proxy
          - pact-settler
          - pact-indexer
      image:
        description: "Full image URI (leave empty for :latest)"
        required: false

env:
  REGION: asia-southeast1
  AR_REPO: pact-network
  CICD_SA: gh-pact-network-sa

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve environment config
        id: env
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "project_id=staging-apps-482206" >> $GITHUB_OUTPUT
            echo "project_number=871482515924" >> $GITHUB_OUTPUT
            echo "wif_pool=wif-staging-apps-pool" >> $GITHUB_OUTPUT
            echo "wif_provider=wif-staging-apps-provider" >> $GITHUB_OUTPUT
          else
            echo "project_id=pact-network" >> $GITHUB_OUTPUT
            # Filled in 2026-05-07 — project pact-network (224627201825)
            echo "project_number=224627201825" >> $GITHUB_OUTPUT
            echo "wif_pool=wif-pact-network-pool" >> $GITHUB_OUTPUT
            echo "wif_provider=wif-pact-network-provider" >> $GITHUB_OUTPUT
          fi

      - name: Resolve image URI
        id: img
        run: |
          if [ -n "${{ inputs.image }}" ]; then
            echo "uri=${{ inputs.image }}" >> $GITHUB_OUTPUT
          else
            echo "uri=${{ env.REGION }}-docker.pkg.dev/${{ steps.env.outputs.project_id }}/${{ env.AR_REPO }}/${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT
          fi

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.env.outputs.project_id }}
          workload_identity_provider: "projects/${{ steps.env.outputs.project_number }}/locations/global/workloadIdentityPools/${{ steps.env.outputs.wif_pool }}/providers/${{ steps.env.outputs.wif_provider }}"
          service_account: "${{ env.CICD_SA }}@${{ steps.env.outputs.project_id }}.iam.gserviceaccount.com"

      # Per-service env-var plumbing.
      #
      # The deploy YAML originally relied on env vars surviving across
      # `gcloud run deploy` calls (`Secret bindings (--set-secrets) are NOT
      # in this workflow — they're applied once via gcloud post-`terraform
      # apply` and persist`). That assumption was incomplete: any env var
      # the SERVICE NEEDS that is NOT a secret (e.g. SOLANA_RPC_URL,
      # PROGRAM_ID for the indexer) was never set anywhere — neither in
      # terraform `env_vars`, nor in `--set-env-vars`, nor in
      # `--update-env-vars` — so the indexer's chain-sync silently fell
      # through to its in-code defaults at boot.
      #
      # We now pass `--update-env-vars` per-service. `--update-env-vars`
      # MERGES (does not replace) so it composes safely with any vars
      # set by terraform / a future ops-time `gcloud run services update`.
      #
      # If a value here is sensitive enough to need a Secret, add it to
      # `secrets_to_create` in `devops/terraform-gcp/pact-network/services.tf`
      # and bind it via a follow-up `--set-secrets`.
      # Per-service env-var plumbing via `--env-vars-file`.
      #
      # The pact-indexer reads SOLANA_RPC_URL + PROGRAM_ID via NestJS
      # ConfigService (= process.env). Until this YAML they were never
      # set anywhere — neither in terraform `env_vars` nor in
      # `--set-env-vars` — so chain-sync silently fell through to its
      # in-code defaults at boot, and `getProgramAccounts` against
      # public `api.mainnet-beta.solana.com` from Cloud Run egress IPs
      # returned 0 endpoints (rate-limited).
      #
      # `--env-vars-file` REPLACES all literal env vars on the service
      # but does NOT touch secret bindings. The pact-indexer has no
      # other literal env vars today (terraform `env_vars = {}`,
      # secrets are bound via `--set-secrets` once post-apply); if a
      # future PR adds another literal env var, also add it here or
      # the next deploy will remove it.
      #
      # SOLANA_RPC_URL: prefer `PACT_INDEXER_RPC_URL` repo secret
      # (Helius/Triton URL with embedded API key). Falls back to
      # public mainnet-beta — which is rate-limited from Cloud Run
      # egress and will likely keep returning 0 endpoints.
      #
      # PROGRAM_ID: pinned mainnet program — set explicitly so a future
      # client-default flip can't silently re-target devnet.
      - name: Resolve per-service env vars
        id: envvars
        env:
          PACT_INDEXER_RPC_URL: ${{ secrets.PACT_INDEXER_RPC_URL }}
        run: |
          if [ "${{ inputs.service_name }}" = "pact-indexer" ]; then
            RPC_URL="${PACT_INDEXER_RPC_URL:-https://api.mainnet-beta.solana.com}"
            if [ "$RPC_URL" = "https://api.mainnet-beta.solana.com" ]; then
              echo "::warning::PACT_INDEXER_RPC_URL secret not set — falling back to public mainnet-beta. Cloud Run egress is rate-limited there; chain-sync may return 0 endpoints. Set the secret to a Helius/Triton URL with API key."
            fi
            # YAML quoting: double-quote both values so URLs with special
            # chars (api keys with `:` or `=`) are preserved verbatim.
            {
              printf 'SOLANA_RPC_URL: "%s"\n' "$RPC_URL"
              printf 'PROGRAM_ID: "5bCJcdWdKLJ7arrMVMFh3z99rQDxV785fnD9XGcr3xwc"\n'
            } > /tmp/cloud-run-env.yaml
            echo "file=/tmp/cloud-run-env.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        run: |
          ARGS=()
          ARGS+=(--image "${{ steps.img.outputs.uri }}")
          ARGS+=(--region "${{ env.REGION }}")
          ARGS+=(--platform managed)
          if [ -n "${{ steps.envvars.outputs.file }}" ]; then
            ARGS+=(--env-vars-file "${{ steps.envvars.outputs.file }}")
          fi
          gcloud run deploy "${{ inputs.service_name }}" "${ARGS[@]}"

      - name: Notify Success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :rocket: *[${{ inputs.environment }}] Deployed*
            Service: `${{ inputs.service_name }}` | Image: `${{ steps.img.outputs.uri }}`
            Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :x: *[${{ inputs.environment }}] Deploy Failed*
            Service: `${{ inputs.service_name }}` | Branch: ${{ github.ref_name }}
            Repo: ${{ github.repository }}
            By: ${{ github.actor }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
