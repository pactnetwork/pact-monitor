# -----------------------------------------------------------------------------
# Pact Network — Deploy to Cloud Run
#
# Deploys one of six Cloud Run services. Image must already exist in
# Artifact Registry (push via build-pact-network.yaml first).
#
# Pattern: copied from devops/pipelines-gcp/qash/deploy.yaml.
#
# Env-var convention (READ BEFORE EDITING):
#   The `cloud-run-service` Terraform module has
#   `lifecycle.ignore_changes = [template[0].containers[0].env]`, so all env
#   vars and secret mounts are managed out-of-band via gcloud. The bare
#   `gcloud run deploy --image ...` below is intentional — it preserves all
#   existing env/secrets across deploys.
#
#   Most env/secret bindings are applied ONCE post-`terraform apply` via
#   `gcloud run services update --update-secrets=...` and persist across
#   deploys. The exception is `INDEXER_PUSH_SECRET` (see below): it is
#   re-asserted on every indexer/settler deploy because a 2026-05-07
#   mainnet-launch incident showed the mount can get clobbered out-of-band
#   and silently 401-spam settler->indexer pushes. The assertion is
#   idempotent (no-op if already correctly mounted).
# -----------------------------------------------------------------------------

name: Deploy to Cloud Run (pact-network)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      service_name:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - pact-market-proxy
          - pact-settler
          - pact-indexer
          - pact-market-dashboard
          - pact-dummy-upstream
          - pact-facilitator
      image:
        description: "Full image URI (leave empty for :latest)"
        required: false

env:
  REGION: asia-southeast1
  AR_REPO: pact-network
  CICD_SA: gh-pact-network-sa

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve environment config
        id: env
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "project_id=staging-apps-482206" >> $GITHUB_OUTPUT
            echo "project_number=871482515924" >> $GITHUB_OUTPUT
            echo "wif_pool=wif-staging-apps-pool" >> $GITHUB_OUTPUT
            echo "wif_provider=wif-staging-apps-provider" >> $GITHUB_OUTPUT
          else
            echo "project_id=pact-network" >> $GITHUB_OUTPUT
            # Filled in 2026-05-07 — project pact-network (224627201825)
            echo "project_number=224627201825" >> $GITHUB_OUTPUT
            echo "wif_pool=wif-pact-network-pool" >> $GITHUB_OUTPUT
            echo "wif_provider=wif-pact-network-provider" >> $GITHUB_OUTPUT
          fi

      - name: Resolve image URI
        id: img
        run: |
          if [ -n "${{ inputs.image }}" ]; then
            echo "uri=${{ inputs.image }}" >> $GITHUB_OUTPUT
          else
            echo "uri=${{ env.REGION }}-docker.pkg.dev/${{ steps.env.outputs.project_id }}/${{ env.AR_REPO }}/${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT
          fi

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.env.outputs.project_id }}
          workload_identity_provider: "projects/${{ steps.env.outputs.project_number }}/locations/global/workloadIdentityPools/${{ steps.env.outputs.wif_pool }}/providers/${{ steps.env.outputs.wif_provider }}"
          service_account: "${{ env.CICD_SA }}@${{ steps.env.outputs.project_id }}.iam.gserviceaccount.com"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service_name }} \
            --image ${{ steps.img.outputs.uri }} \
            --region ${{ env.REGION }} \
            --platform managed

      # Re-assert the INDEXER_PUSH_SECRET secret mount on every indexer and
      # settler deploy. The indexer guard at
      # `packages/indexer/src/guards/push-secret.guard.ts` reads
      # `process.env.INDEXER_PUSH_SECRET`; the settler signs its push to the
      # indexer with the same value. If the mount drifts (e.g. someone runs
      # `gcloud run services update --remove-secrets=...` or re-mounts under
      # the wrong env-var name), every settler->indexer push 401s and
      # mainnet settlements stop reconciling — exactly the 2026-05-07
      # incident.
      #
      # Uses `--update-secrets` (merge), NOT `--set-secrets` (destructive
      # replace). Only re-asserts the one secret; other secret mounts
      # (PACT_HELIUS_API_KEY, PACT_SETTLEMENT_AUTHORITY_BS58, etc.) are
      # untouched.
      - name: Assert INDEXER_PUSH_SECRET mount
        if: inputs.service_name == 'pact-indexer' || inputs.service_name == 'pact-settler'
        run: |
          gcloud run services update ${{ inputs.service_name }} \
            --region ${{ env.REGION }} \
            --update-secrets=INDEXER_PUSH_SECRET=PACT_INDEXER_PUSH_SECRET:latest

      - name: Notify Success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :rocket: *[${{ inputs.environment }}] Deployed*
            Service: `${{ inputs.service_name }}` | Image: `${{ steps.img.outputs.uri }}`
            Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :x: *[${{ inputs.environment }}] Deploy Failed*
            Service: `${{ inputs.service_name }}` | Branch: ${{ github.ref_name }}
            Repo: ${{ github.repository }}
            By: ${{ github.actor }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
