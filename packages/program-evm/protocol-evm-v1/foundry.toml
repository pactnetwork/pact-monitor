[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
# Arc targets the Prague EVM hard fork (design PR #201 §4.8.4). solc >= 0.8.30
# is required for the `prague` evm_version.
solc = "0.8.30"
evm_version = "prague"
optimizer = true
optimizer_runs = 200
# WP-EVM-02 introduces OpenZeppelin (access control / SafeERC20) and
# forge-std (test harness for the ported LiteSVM parity suite).
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/=lib/openzeppelin-contracts/"
]

# Allow vm.readFile in tests + scripts to read the chain config file.
# Read-only: Deploy.s.sol + test/Deployment.t.sol use vm.readFile on chains.json.
fs_permissions = [{ access = "read", path = "config/" }]

# Arc Testnet RPC. Value comes from .env at deploy time (WP-EVM-07); never
# committed. Verified endpoint per design §4.8.4.
[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

# Contract verification against arcscan: the exact flow (Etherscan-compatible
# API vs custom) is an unconfirmed residual unknown in design §4.8.4. Wiring
# is deferred to WP-EVM-07.
