[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc           = "0.8.24"
evm_version    = "cancun"
optimizer      = true
optimizer_runs = 200
remappings     = [
  "@openzeppelin/=lib/openzeppelin-contracts/contracts/",
  "@0gfoundation/inft/=lib/0g-agent-nft/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[fmt]
line_length = 100
tab_width   = 4

[rpc_endpoints]
zerog         = "${RPC_URL}"
zerog_mainnet = "https://evmrpc.0g.ai"
zerog_testnet = "https://evmrpc-testnet.0g.ai"

[etherscan]
zerog_testnet = { key = "${ZEROG_EXPLORER_API_KEY}", url = "https://chainscan-galileo.0g.ai/api", chain = 16602 }
zerog_mainnet = { key = "${ZEROG_EXPLORER_API_KEY}", url = "https://chainscan.0g.ai/api",         chain = 16661 }
