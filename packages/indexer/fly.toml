app = "pact-indexer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[env]
  NODE_ENV = "production"

# secrets set via `fly secrets set`:
# PG_URL
# HELIUS_WEBHOOK_SECRET
# PROGRAM_ID
