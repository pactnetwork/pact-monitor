[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
solc        = "0.8.24"
evm_version = "cancun"
optimizer   = true
optimizer_runs = 200

# 0G Aristotle mainnet
[rpc_endpoints]
zerog         = "${RPC_URL}"
zerog_mainnet = "https://evmrpc.0g.ai"
zerog_testnet = "https://evmrpc-testnet.0g.ai"

# Default below is Galileo testnet (chain 16602). Switch to mainnet only for
# the Day-18 submission deploy by uncommenting the mainnet block.
[etherscan]
zerog = { key = "${ZEROG_EXPLORER_API_KEY}", url = "https://chainscan-galileo.0g.ai/api", chain = 16602 }
# zerog = { key = "${ZEROG_EXPLORER_API_KEY}", url = "https://chainscan.0g.ai/api", chain = 16661 }
